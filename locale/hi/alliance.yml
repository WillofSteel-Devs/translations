alliance:
  creation_embed_title: '1. :shield: एलायंस क्रिएशन - फोर्जिंग बॉन्ड्स एंड ग्लोरी'
  creation_embed_description: 'गठबंधन के दायरे में आपका स्वागत है! हमारी उन्नत एलायंस क्रिएशन सुविधा के साथ, आप एक अजेय गठबंधन बनाने के लिए साथी साहसी, योद्धाओं और रणनीतिकारों को एक साथ ला सकते हैं। एक एकीकृत शक्ति के रूप में सहयोग करें, योजना बनाएं और जीत हासिल करें!'
  creation_embed_field1_title: 'गठबंधन के लाभ:'
  creation_embed_field1_value: ":handshake: **एकता में ताकत:** अपराजेय शक्ति के लिए अपने सदस्यों की विविध शक्तियों को मिलाएं।\n:trophy: **उपलब्धि पुरस्कार:** महाकाव्य पुरस्कारों और मान्यता के साथ जीत का जश्न मनाएं।\n:japanese_castle: **मजबूत समुदाय:** स्थायी मित्रता बनाएँ!"
  creation_embed_footer: 'आपके द्वारा बनाए गए बंधन अटूट हों, और आपके द्वारा प्राप्त की गई महिमा चिरस्थायी हो!'
  management_embed_title: 'गठबंधन की जानकारी'
  management_embed_field1_title: ':scroll: **गठबंधन का नाम:**'
  management_embed_field2_title: ':family_mmgb: **उपयोगकर्ता सीमा:**'
  creation_success_embed_title: 'निम्नलिखित गठबंधन सफलतापूर्वक बनाया गया:'
  creation_success_embed_field1_title: '**गठबंधन का नाम:**'
  creation_success_embed_field2_title: '**उपयोगकर्ता सीमा:**'
  creation_success_embed_footer: 'उन्हें दिखाओ कि कौन शासन है.'
  error_member_of_alliance: "आप पहले से ही एक गठबंधन में हैं, अपना खुद का गठबंधन बनाने के लिए इसे छोड़ दें!"
  error_not_enough_rubies: "आपके पास गठबंधन बनाने के लिए पर्याप्त माणिक नहीं हैं। आपको `600` {ruby_emote} की आवश्यकता है।"
  error_invalid_name: 'इस नाम से एक गठबंधन पहले से ही मौजूद है!'
