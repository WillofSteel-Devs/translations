alliance:
  creation_embed:
    title: '1. :shield: Création d''alliance - Forger des liens et de la Gloire'
    description: 'Bienvenue au royaume des alliances ! Grâce à notre fonctionnalité avancée de création d''alliance, vous pouvez rassembler d''autres aventuriers, guerriers et stratèges pour former une alliance imparable. Collaborez, planifiez et conquérez en tant que force unifiée ! alliance. creation_embed. description!'
    field1:
      title: 'Avantages d''Alliance :'
      value: ":handshake: **La force dans l'unité :** Combinez les diverses forces de vos membres pour un pouvoir imbattable. \n:trophy: **Récompenses de réussite :** Célébrez les victoires avec des récompenses et une reconnaissance épiques.\n:japanese_castle: **Communauté forte ;** Formez des triéridies durables !\nalliance.création embed.field1.value!"
    footer: 'Que les liens que vous créez soient incassables et que la gloire que vous !'
  management_embed:
    title: "**:gear: Gestion d'alliance :**"
    desc: "Ce menu d'affichage est **uniquement** réservé au propriétaire de l'alliance. Le propriétaire doit noter que toute modification ne peut être annulée."
  creation_success_embed:
    title: 'Création réussie de l''alliance suivante :'
    field1:
      title: '**Nom de l''alliance :**'
    field2:
      title: '**Limite d''utilisateurs :**'
    footer: 'Montrez-leur qui règne.'
  members_embed:
    title: 'Membres de l''Alliance'
  wars_embed:
    title: 'Guerres:'
    description_ifwars: "Ce sont toutes les guerres dans lesquelles notre alliance se trouve actuellement. \nPour des informations spécifiques, cliquez sur l'une des guerres dans la liste déroulante."
    description_nowars: 'Nous devons encore montrer notre potentiel de guerre. Les choses sont paisibles ici.'
  truce_embed:
    title: '**L''Alliance a mis fin aux guerres :**'
    desc_truced: "Ce sont toutes les alliances avec lesquelles nous avons signé la trêve. Pour des informations spécifiques, cliquez sur l'une des guerres dans la liste déroulante."
    desc_notruce: 'Nous n’avons pas encore conclu d’accord de paix avec nos ennemis !'
  transactions_embed:
    title: "**Transactions d'alliance :**"
    desc: "Ce sont toutes les transactions effectuées par les membres de l'alliance. Pour des informations spécifiques, cliquez sur l’une des transactions dans le menu déroulant."
    desc_no_transactions: "Vous ne semblez avoir encore aucune transaction."
  management_buttons:
    alliance_members: 'Membres'
    alliance_wars: 'Guerres'
    alliance_peace: 'Paix'
    alliance_disband: 'Gestions des Alliances'
    alliance_view_transactions: 'Afficher les transactions'
  alliance_war_format:
    against_title: 'Guerre contre `{defender}` (Guerre ID : `{war_id} `)'
    against_desc: "**Attaquer:** {attacker}\n{emote1} **Trêve **: Non\n{emote2} **demande de trêve des attaquants:** {attacker_truce}\n{emote3} **Demande de trêve des défenseurs:** {defender_truce}"
    with_title: 'Guerre avec `{attacker}` (Guerre ID : `{war_id}`)'
    with_desc: "**Défenseur :** {defender}\n{emote1} **Trêve** : Non\n{emote2} **Demande de trêve des attaquants :** {attacker_truce}\n{emote3} **Demande de trêve des défenseurs :** {defender_truce}"
  alliance_truce_format:
    attacker: "{emote1} **Attaquer :** {attacker}\n{emote2} **Trêve :** Oui"
    defender: "{emote1} **Défenseur :** {defender}\n{emote2} **Trêve :** Oui"
  error_member_of_alliance: "Vous êtes déjà dans une alliance, laissez-le créer la vôtre !"
  error_not_enough_rubies: "Vous n'avez pas assez de rubis pour conclure une alliance. Vous avez besoin de `600` {ruby_emote}."
  error_invalid_name: 'Une alliance existe déjà avec ce nom !'
  error_not_owner: "Vous ne pouvez pas effectuer cette action car vous ne possédez pas l'alliance."
